global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # AlertFlow backend metrics (if you add a /metrics endpoint later)
  - job_name: 'alertflow-backend'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 30s

  # Chaos simulator — the key new addition
  - job_name: 'chaos-simulator'
    static_configs:
      - targets: ['chaos-simulator:8001']
    scrape_interval: 15s
    metrics_path: /metrics

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']


