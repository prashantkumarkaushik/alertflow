# ─────────────────────────────────────────────────────────────────────────────
# ADD THIS SERVICE to your existing compose.yml under `services:`
# ─────────────────────────────────────────────────────────────────────────────

  chaos-simulator:
    build:
      context: ./chaos-simulator
      dockerfile: Dockerfile
    container_name: chaos-simulator
    restart: always
    ports:
      - "8001:8001"
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3


# ─────────────────────────────────────────────────────────────────────────────
# UPDATE your existing prometheus service volumes to point to the new rules:
# Replace the existing prometheus volumes section with:
# ─────────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    restart: "no"
    ports:
      - "9090:9090"
    networks:
      - default
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - ./monitoring/rules.yml:/etc/prometheus/rules.yml:z
      - app-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'


# ─────────────────────────────────────────────────────────────────────────────
# ALSO add this to your volumes: section at the bottom of compose.yml
# (it's already noted in your compose.yml as a comment — just uncomment it)
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  app-db-data:
  app-redis-data:
  app-prometheus-data:   # ← remove the comment, make it real
