global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'alertflow-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['alertflow-backend-1:8000']

  - job_name: 'prometheus'
    static_configs:
