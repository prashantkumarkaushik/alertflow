services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - app-db-data:/var/lib/postgresql/data
    security_opt:
      - "label:disable"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      restart: always
      depends_on:
        - backend

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - app-redis-data:/data
    security_opt:
      - "label:disable"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_URL=redis://redis:6379/0

  prometheus:
    image: prom/prometheus:latest
    restart: "no"
    ports:
      - "9090:9090"
    networks:
      - default
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - ./monitoring/rules.yml:/etc/prometheus/rules.yml:z
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  alertmanager:
    image: prom/alertmanager:latest
    restart: "no"
    ports:
      - "9093:9093"
    networks:
      - default
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:z
      - ./monitoring/token.txt:/etc/alertmanager/token.txt:z
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'

volumes:
  app-db-data:
  app-redis-data:
  app-prometheus-data:    # ← add this
