services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
      restart: "no"
      ports:
        - "8000:8000"
      command:
        - uv
        - run
        - uvicorn
        - app.main:app
        - --host
        - 0.0.0.0
        - --port
        - "8000"
        - --reload
      volumes:
        - ./backend/app:/app/app:z
      environment:
        - ENVIRONMENT=local
        - PYTHONPATH=/app

